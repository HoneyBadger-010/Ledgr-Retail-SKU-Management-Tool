# Railway Configuration for Ledgr
# This file configures the deployment settings for Railway

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "gunicorn --workers 4 --bind 0.0.0.0:$PORT --preload --max-requests 1000 --max-requests-jitter 50 --timeout 120 --access-logfile - --error-logfile - --log-level info --worker-class sync --worker-tmp-dir /dev/shm app:app"
healthcheckPath = "/login"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

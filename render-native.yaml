# Render Blueprint for Ledgr - Native Python Build (FREE TIER COMPATIBLE)
# This uses native Python runtime instead of Docker

services:
  # Main Web Application (Native Python)
  - type: web
    name: ledgr-web
    runtime: python
    plan: free
    region: oregon
    buildCommand: "./build.sh"
    startCommand: "./start.sh"
    healthCheckPath: /login
    # Ensure database is seeded on every deployment
    preDeployCommand: python init_production_db.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ledgr-db
          property: connectionString
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: HIDE_DEMO_CREDENTIALS
        value: "1"

databases:
  - name: ledgr-db
    databaseName: ledgr_prod
    user: ledgr_prod
    plan: free

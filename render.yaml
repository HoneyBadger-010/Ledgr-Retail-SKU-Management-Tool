# Render Blueprint for Ledgr - Production Deployment
# This file configures all services needed for production deployment on Render

services:
  # Main Web Application
  - type: web
    name: ledgr-web
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /login
    # Ensure database is seeded on every deployment
    preDeployCommand: python init_production_db.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ledgr-db
          property: connectionString
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: HIDE_DEMO_CREDENTIALS
        value: "1"

  # Background Scheduler Worker (optional - comment out if not needed)
  - type: worker
    name: ledgr-scheduler
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerCommand: python scheduler.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ledgr-db
          property: connectionString
      - key: FLASK_SECRET_KEY
        fromService:
          type: web
          name: ledgr-web
          envVarKey: FLASK_SECRET_KEY
      - key: FLASK_ENV
        value: production

databases:
  - name: ledgr-db
    databaseName: ledgr_prod
    user: ledgr_prod
    plan: starter

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{% block title %}Sunrise Demand AI{% endblock %} — Sunrise Consumer Goods</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.2.0/dist/css/tabler.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.44.0/dist/apexcharts.min.js"></script>
  <style>
    :root {
      --sunrise-primary: #6366f1;
      --sunrise-secondary: #8b5cf6;
      --sunrise-accent: #f59e0b;
      --sunrise-danger: #ef4444;
      --sunrise-success: #10b981;
      --sunrise-warning: #f97316;
      --sunrise-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 30%, #ec4899 60%, #f59e0b 100%);
      --sunrise-gradient-subtle: linear-gradient(135deg, #6366f110 0%, #8b5cf610 30%, #ec489910 60%, #f59e0b10 100%);
      --glass-bg: rgba(255,255,255,0.7);
      --glass-border: rgba(255,255,255,0.3);
      --shadow-soft: 0 4px 24px rgba(0,0,0,0.06);
      --shadow-hover: 0 8px 32px rgba(99,102,241,0.15);
    }
    * { font-family: 'Inter', -apple-system, sans-serif !important; }
    body { background: #f0f2f8; }

    /* ── Animated Gradient Strips ── */
    .gradient-strip-top, .gradient-strip-bottom {
      position: fixed; left: 0; right: 0; height: 4px; z-index: 9999;
      background: var(--sunrise-gradient); background-size: 300% 300%;
      animation: gradientShift 4s ease infinite;
    }
    .gradient-strip-top { top: 0; }
    .gradient-strip-bottom { bottom: 0; }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Sidebar ── */
    .navbar-vertical {
      background: linear-gradient(180deg, #1e1b4b 0%, #312e81 50%, #3730a3 100%) !important;
      border-right: none !important;
      box-shadow: 4px 0 24px rgba(30,27,75,0.3);
    }
    .navbar-vertical .nav-link {
      border-radius: 10px; margin: 2px 12px; padding: 10px 14px;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1); color: rgba(255,255,255,0.65) !important;
      font-weight: 500; letter-spacing: 0.01em;
    }
    .navbar-vertical .nav-link:hover {
      background: rgba(255,255,255,0.12) !important; color: #fff !important;
      transform: translateX(4px);
    }
    .navbar-vertical .nav-link.active {
      background: linear-gradient(135deg, #6366f1, #8b5cf6) !important;
      color: #fff !important; box-shadow: 0 4px 16px rgba(99,102,241,0.4);
      transform: translateX(2px);
    }
    .navbar-vertical .nav-link-icon { opacity: 0.8; }
    .navbar-vertical .nav-link.active .nav-link-icon { opacity: 1; }
    .navbar-brand-autodark span {
      background: linear-gradient(135deg, #fbbf24, #f59e0b, #f97316);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      font-weight: 800; font-size: 22px !important; letter-spacing: -0.5px;
    }

    /* ── Page Header ── */
    .page-header {
      background: linear-gradient(135deg, rgba(99,102,241,0.04) 0%, rgba(139,92,246,0.06) 100%);
      border-bottom: 1px solid rgba(99,102,241,0.08); padding-top: 20px !important;
    }
    .page-pretitle { color: var(--sunrise-secondary); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; font-size: 11px; }
    .page-title { font-weight: 800; letter-spacing: -0.03em; font-size: 1.6rem; color: #1e1b4b; }

    /* ── Cards ── */
    .card {
      border: none !important; border-radius: 14px !important;
      box-shadow: var(--shadow-soft); transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
      background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
      overflow: hidden;
    }
    .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-3px); }
    .card-header {
      background: transparent; border-bottom: 1px solid rgba(99,102,241,0.06);
      font-weight: 700;
    }

    /* ── KPI Cards ── */
    .kpi-card { position: relative; overflow: hidden; }
    .kpi-card::before {
      content: ''; position: absolute; top: -50%; right: -30%; width: 120px; height: 120px;
      border-radius: 50%; opacity: 0.06; transition: all 0.4s;
    }
    .kpi-card:hover::before { opacity: 0.12; transform: scale(1.3); }
    .kpi-card .h1, .kpi-card .h2 {
      font-weight: 800; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #1e1b4b, #4338ca);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .kpi-card .subheader {
      font-weight: 600; font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; opacity: 0.7;
    }
    .kpi-danger::before { background: var(--sunrise-danger); }
    .kpi-warning::before { background: var(--sunrise-warning); }
    .kpi-success::before { background: var(--sunrise-success); }
    .kpi-primary::before { background: var(--sunrise-primary); }

    /* ── Animated Number Counter ── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .animate-in { animation: fadeUp 0.5s ease forwards; }

    /* ── Signal Tags ── */
    .signal-tag {
      display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px;
      font-weight: 700; margin: 2px; letter-spacing: 0.02em;
      transition: all 0.2s; cursor: default;
    }
    .signal-tag:hover { transform: scale(1.05); }
    .signal-dropout { background: linear-gradient(135deg,#fee2e2,#fecaca); color: #991b1b; }
    .signal-surge { background: linear-gradient(135deg,#fef3c7,#fde68a); color: #92400e; }
    .signal-pattern { background: linear-gradient(135deg,#dbeafe,#bfdbfe); color: #1e40af; }
    .signal-inventory { background: linear-gradient(135deg,#e0e7ff,#c7d2fe); color: #3730a3; }
    .signal-promo { background: linear-gradient(135deg,#d1fae5,#a7f3d0); color: #065f46; }

    /* ── Reason Text ── */
    .reason-text {
      font-size: 13px; line-height: 1.7; color: #475569; padding: 14px 18px;
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      border-radius: 10px; border-left: 4px solid var(--sunrise-primary);
    }

    /* ── Badges ── */
    .badge { font-weight: 700; letter-spacing: 0.03em; border-radius: 6px; padding: 4px 10px; }
    .bg-green { background: linear-gradient(135deg,#10b981,#059669) !important; }
    .bg-yellow { background: linear-gradient(135deg,#f59e0b,#d97706) !important; }
    .bg-red { background: linear-gradient(135deg,#ef4444,#dc2626) !important; }
    .bg-blue { background: linear-gradient(135deg,#6366f1,#4f46e5) !important; }
    .bg-orange { background: linear-gradient(135deg,#f97316,#ea580c) !important; }
    .bg-purple { background: linear-gradient(135deg,#8b5cf6,#7c3aed) !important; }
    .bg-danger { background: linear-gradient(135deg,#ef4444,#dc2626) !important; }
    .bg-warning { background: linear-gradient(135deg,#f59e0b,#d97706) !important; color:#fff !important; }
    .bg-cyan { background: linear-gradient(135deg,#06b6d4,#0891b2) !important; }

    /* ── Tables ── */
    .table thead th {
      background: linear-gradient(135deg, #f8fafc, #f1f5f9);
      font-weight: 700; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.06em; color: #64748b; border-bottom: 2px solid rgba(99,102,241,0.1);
    }
    .table tbody tr { transition: all 0.2s; }
    .table tbody tr:hover { background: rgba(99,102,241,0.03); }

    /* ── Buttons ── */
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6) !important;
      border: none !important; box-shadow: 0 4px 12px rgba(99,102,241,0.3);
      font-weight: 600; border-radius: 10px; transition: all 0.3s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
    .btn-green {
      background: linear-gradient(135deg,#10b981,#059669) !important;
      border: none !important; box-shadow: 0 4px 12px rgba(16,185,129,0.3);
    }
    .btn-outline-primary { border-color: var(--sunrise-primary); color: var(--sunrise-primary); border-radius: 8px; font-weight: 600; }
    .btn-outline-primary.active, .btn-outline-primary:hover {
      background: linear-gradient(135deg,#6366f1,#8b5cf6) !important; color: #fff !important; border-color: transparent;
    }

    /* ── Hero Card ── */
    .hero-card {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 40%, #a78bfa 100%) !important;
      color: #fff !important; border-radius: 16px !important;
      box-shadow: 0 8px 32px rgba(99,102,241,0.3);
    }
    .hero-card h1, .hero-card .display-6 { color: #fff !important; -webkit-text-fill-color: #fff; font-weight: 800; }
    .hero-card p { color: rgba(255,255,255,0.8) !important; }

    /* ── Select Dropdowns ── */
    .form-select { border-radius: 10px; border: 2px solid #e2e8f0; font-weight: 500; transition: all 0.3s; }
    .form-select:focus { border-color: var(--sunrise-primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }

    /* ── Alert ── */
    .alert { border-radius: 12px; border: none; font-weight: 500; }
    .alert-success { background: linear-gradient(135deg,#d1fae5,#a7f3d0); color: #065f46; }
    .alert-danger { background: linear-gradient(135deg,#fee2e2,#fecaca); color: #991b1b; }

    /* ── Scroll ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #6366f1; }

    /* ── Loading Pulse ── */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .loading-pulse { animation: pulse 1.5s ease-in-out infinite; color: #94a3b8; }

    /* ── Page Body ── */
    .page-body { padding-top: 1.5rem; }
    .page-wrapper { margin-top: 4px; }  /* offset for top strip */

    /* ── Staggered card entrance ── */
    .row-deck .col-sm-6:nth-child(1) .card { animation: fadeUp 0.4s ease forwards; }
    .row-deck .col-sm-6:nth-child(2) .card { animation: fadeUp 0.5s ease forwards; }
    .row-deck .col-sm-6:nth-child(3) .card { animation: fadeUp 0.6s ease forwards; }
    .row-deck .col-sm-6:nth-child(4) .card { animation: fadeUp 0.7s ease forwards; }
    .row-deck .col-lg-3:nth-child(1) .card { animation: fadeUp 0.4s ease forwards; }
    .row-deck .col-lg-3:nth-child(2) .card { animation: fadeUp 0.5s ease forwards; }
    .row-deck .col-lg-3:nth-child(3) .card { animation: fadeUp 0.6s ease forwards; }
    .row-deck .col-lg-3:nth-child(4) .card { animation: fadeUp 0.7s ease forwards; }
  </style>
</head>
<body class="theme-light">
  <!-- Animated gradient strips -->
  <div class="gradient-strip-top"></div>
  <div class="gradient-strip-bottom"></div>

  <div class="page">
    <!-- Sidebar -->
    <aside class="navbar navbar-vertical navbar-expand-lg" data-bs-theme="dark">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar-menu"><span class="navbar-toggler-icon"></span></button>
        <div class="navbar-brand navbar-brand-autodark py-3">
          <span>Sunrise AI</span>
        </div>
        <div class="collapse navbar-collapse" id="sidebar-menu">
          <ul class="navbar-nav pt-lg-3">
            <li class="nav-item"><a class="nav-link {% if page=='overview' %}active{% endif %}" href="/"><span class="nav-link-icon"><i class="ti ti-dashboard"></i></span><span class="nav-link-title">Overview</span></a></li>
            <li class="nav-item"><a class="nav-link {% if page=='retrospective' %}active{% endif %}" href="/retrospective"><span class="nav-link-icon"><i class="ti ti-search"></i></span><span class="nav-link-title">Diwali Retrospective</span></a></li>
            <li class="nav-item"><a class="nav-link {% if page=='forecast' %}active{% endif %}" href="/forecast"><span class="nav-link-icon"><i class="ti ti-chart-line"></i></span><span class="nav-link-title">6-Week Forecast</span></a></li>
            <li class="nav-item"><a class="nav-link {% if page=='reorder' %}active{% endif %}" href="/reorder"><span class="nav-link-icon"><i class="ti ti-shopping-cart"></i></span><span class="nav-link-title">Reorder Plan</span></a></li>
            <li class="nav-item"><a class="nav-link {% if page=='classification' %}active{% endif %}" href="/classification"><span class="nav-link-icon"><i class="ti ti-tags"></i></span><span class="nav-link-title">SKU Classification</span></a></li>
            <li class="nav-item"><a class="nav-link {% if page=='accuracy' %}active{% endif %}" href="/accuracy"><span class="nav-link-icon"><i class="ti ti-target"></i></span><span class="nav-link-title">Forecast Accuracy</span></a></li>
          </ul>
        </div>
      </div>
    </aside>
    <!-- Page wrapper -->
    <div class="page-wrapper">
      <div class="page-header d-print-none">
        <div class="container-xl">
          <div class="page-pretitle">Sunrise Consumer Goods -- Pune & Nashik</div>
          <h2 class="page-title">{% block page_title %}Dashboard{% endblock %}</h2>
        </div>
      </div>
      <div class="page-body">
        <div class="container-xl">
          {% block content %}{% endblock %}
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.2.0/dist/js/tabler.min.js"></script>
  <script>
    // Animate numbers counting up
    function animateValue(el,start,end,dur){
      if(!el)return;let st=null;const step=(ts)=>{if(!st)st=ts;const p=Math.min((ts-st)/dur,1);
      const v=Math.floor(p*(end-start)+start);el.textContent=el.dataset.prefix+(v).toLocaleString('en-IN')+el.dataset.suffix;
      if(p<1)window.requestAnimationFrame(step);};window.requestAnimationFrame(step);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
